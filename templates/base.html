<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Interview Prep Coach{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-slow { animation: pulse-slow 2s ease-in-out infinite; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
            <a href="/" class="text-xl font-bold text-gray-900 tracking-tight">
                Interview Prep Coach
            </a>
            <div class="flex items-center gap-4">
                <a href="/" class="text-sm text-gray-600 hover:text-gray-900 transition">Dashboard</a>
                <a href="/submit"
                   class="bg-blue-600 text-white text-sm font-medium px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                    + New Interview
                </a>
            </div>
        </div>
    </nav>

    <main class="flex-1 max-w-5xl mx-auto w-full px-4 sm:px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="max-w-5xl mx-auto w-full px-4 sm:px-6 py-6 text-center text-gray-400 text-xs">
        Powered by Dapr Workflow, Pub/Sub, State Management &amp; AI &mdash; Running on Diagrid Catalyst
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
