<!doctype html>
<html lang="en">
  <head>
    <script>
      // Theme resolution runs BEFORE React mounts so we never flash the
      // wrong scheme. Precedence:
      //   1. Explicit user choice in localStorage ("dark" | "light") —
      //      wins over everything. Set by the Settings → Theme toggle.
      //   2. OS / browser preference via `prefers-color-scheme: dark` —
      //      honors iOS "Dark Mode" and macOS / Windows system theme.
      //   3. Hard fallback → dark (our brand default when the media
      //      query is indeterminate, e.g. ancient browsers).
      (function () {
        try {
          var k = "interviewprep-theme";
          var stored = localStorage.getItem(k);
          var prefersDark =
            typeof window.matchMedia === "function" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          var dark =
            stored === "dark" ||
            (stored !== "light" && (prefersDark || stored === null));
          if (dark) document.documentElement.classList.add("dark");
          else document.documentElement.classList.remove("dark");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
